# vim:fileencoding=utf-8:filetype=toml
# Common configs
command_timeout = 1000
continuation_prompt = "[ÔÇ║](yellow) "
format = """
$shlvl\
$sudo\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
$hg_branch\
$cmake\
$elixir\
$erlang\
$golang\
$helm\
$java\
$kotlin\
$lua\
$nodejs\
$python\
$ruby\
$rust\
$terraform\
$vagrant\
$vlang\
$aws\
$gcloud\
$kubernetes\
$env_var\
$cmd_duration\
${custom.proxy}\
$line_break\
$jobs\
$nix_shell\
${custom.venv}\
${custom.devpod}\
$character"""

[sudo]
disabled = false
format = "[$symbol]($style)"
style = "bold red"
symbol = "¾░»ä "

[username]
format = "[$user]($style) "

[hostname]
format = "[@]($style) [$hostname]($style) "
style = "bright-black"

[shlvl]
disabled = true
symbol = "´Æë "

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
fish_style_pwd_dir_length = 1
truncation_length = 3
style = "bold blue"

[git_branch]
format = " [$symbol$branch]($style)"
style = "bright-black"
symbol = "¯éá"

[git_commit]
format = " [¾░£ÿ$hash](cyan)( [$tag](green))"
tag_disabled = false
tag_symbol = "´Ç½ "

[git_status]
format = "[$all_status$ahead_behind]($style)"

[git_metrics]
disabled = false
format = "( ([+$added]($added_style))([-$deleted]($deleted_style)))"

[git_state]
format = ' \([$state $progress_current/$progress_total]($style)\)'

[cmd_duration]
format = " [$duration]($style)"

[nix_shell]
format = "[$state $name]($style) "
style = "bright-black"

[character]
error_symbol = "[╬╗](bold red)"
success_symbol = "[╬╗](bold purple)"
vicmd_symbol = "[╬Á](bold purple)"

# Custom
[custom.proxy]
command = 'echo $HTTPS_PROXY | sed "s/http\:\/\///gi;s/\/$//gi"'
when = 'test "$HTTPS_PROXY" != ""'
format = " [$symbol$output]($style)"
style = "#ffaf87"
symbol = "¾░Æä "

[custom.venv]
command = 'basename "$VIRTUAL_ENV"'
when = 'test "$VIRTUAL_ENV" != ""'
format = "[$output]($style) "
style = "bright-black"

[custom.devpod]
command = "echo $DEVPOD_WORKSPACE_ID"
when = 'test "$DEVPOD_WORKSPACE_ID" != ""'
format = "[$symbol$output]($style) "
style = "bright-black"
symbol = "´ÆÀ "

# Platforms support
[aws]
format = ' [$symbol( $profile)( \($region\))( \[$duration\])]($style)'
style = "bold #ff9900"
symbol = "¾░©Å"

[docker_context]
format = " [$symbol$context]($style)"
style = "bold #0db7ed"
symbol = "¾░í¿ "

[kubernetes]
disabled = false
format = " [$symbol$context]($style)[@](bright-black)[$namespace]($style)"
style = "bold #326ce5"
symbol = "¾▒â¥ "

[gcloud]
format = " [$symbol( $project[@](bright-black)$region)]($style)"
symbol = "¾▒çÂ"
style = "bold #4285f4"

# Languages support
[cmake]
format = " [$symbol($version)]($style)"
style = "bold #e25241"

[deno]
format = " [$symbol$version]($style)"
version_format = "$raw"

[elixir]
format = ' [$symbol$version \(OTP $otp_version\)]($style)'
style = "bold #6e4a7e"
symbol = "¯ÿ¡ "
version_format = "$raw"

[golang]
format = " [$symbol$version]($style)"
style = "bold #29beb0"
symbol = "¯ÿº "
version_format = "$raw"

[java]
format = " [$symbol$version]($style)"
style = "bold #ffa518"
symbol = "¯ëû "
version_format = "$raw"

[kotlin]
format = " [$symbol$version]($style)"
style = "bold #1aa2d4"
symbol = "¯ÿ┤ "
version_format = "$raw"

[lua]
format = " [$symbol$version]($style)"
style = "bold #29beb0"
symbol = "¯ÿá "
version_format = "$raw"

[nodejs]
format = " [$symbol$version]($style)"
style = "bold #3c873a"
symbol = "¯┤ì "
version_format = "$raw"

[python]
format = " [$symbol$version]($style)"
style = "bold #ffd43b"
symbol = "¯ÿå "
version_format = "$raw"

[ruby]
format = " [$symbol$version]($style)"
style = "bold #d51f06"
symbol = "¯×æ "
version_format = "$raw"

[rust]
format = " [$symbol$version]($style)"
style = "bold #b7410e"
symbol = "¾▒ÿù "
version_format = "$raw"

[terraform]
format = " [$symbol$version]($style)"
style = "bold #844fba"
symbol = "¾▒üó "
version_format = "$raw"

[vagrant]
format = " [$symbol$version]($style)"
style = "bold #1868f2"
symbol = "¯úÉ "

[vlang]
format = " [$symbol$version]($style)"
style = "bold #5d87bf"
symbol = "¯Ü¼ "
version_format = "$raw"
