[settings]
experimental = true
lockfile = true

[tools]
go = "1.26.3"
java = "openjdk-26.0.1"
lua = "5.1"
luajit = "2.1.1744318430"
node = "26.1.0"
python = "3.14.5"
ruby = "4.0.5"
rust = "1.95.0"
terraform = "1.15.3"

# Then tools
awscli = { version = "2.34.50", symlink_bins = "true" }
cmake = "4.3.2"
coursier = { version = "2.1.24", exe = "cs" }
gcloud = { version = "569.0.0", postinstall = "gcloud components install $(cat ~/.default-cloud-sdk-components)" }
gh = "2.92.0"
helm = "4.2.0"
make = "4.4.1"
maven = "3.9.16"
ninja = "1.13.2"
opencode = "1.15.5"
rtk = { version = "0.40.0", postinstall = "rtk init -g --opencode" }
tree-sitter = "0.26.9"
uv = "0.11.15"

# And custom tools
[tools."http:cypher-shell"]
# Check latest version at: https://neo4j.com/deployment-center/?cypher-shell
version = "2026.04.0"
bin = "cypher-shell"
url = "https://dist.neo4j.org/cypher-shell/cypher-shell-{{ version }}.zip"
checksum = "sha256:b4cb19331c8eefda3a16f8f82acee2a906f79a4943a510e9f5173ebc4c024a9f"
