[settings]
experimental = true
lockfile = true

[tools]
# Languages go first
clang = "22.1.3"
go = "1.26.2"
java = "openjdk-26.0.1"
lua = "5.5.0"
luajit = "2.1.1744318430"
node = "25.9.0"
python = "3.14.4"
ruby = "4.0.3"
rust = "1.95.0"
terraform = "1.14.9"

# Then tools
awscli = { version = "2.34.35", symlink_bins = "true" }
cmake = "4.3.2"
coursier = { version = "2.1.24", exe = "cs" }
gcloud = { version = "565.0.0", postinstall = "gcloud components install $(cat ~/.default-cloud-sdk-components)" }
gh = "2.91.0"
helm = "4.1.4"
make = "4.4.1"
maven = "3.9.15"
ninja = "1.13.2"
opencode = "1.14.20"
rtk = "0.37.2"
tree-sitter = "0.26.8"
uv = "0.11.7"

# And custom tools
[tools."http:cypher-shell"]
# Check latest version at: https://neo4j.com/deployment-center/?cypher-shell
version = "2026.03.1"
bin = "cypher-shell"
url = "https://dist.neo4j.org/cypher-shell/cypher-shell-{{ version }}.zip"
checksum = "sha256:9f8ed192c9cbbb9340e69992efc48799a017f5c187f761d220031750226d5345"
