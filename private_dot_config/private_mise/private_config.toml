[settings]
experimental = true
lockfile = true

[tools]
# Languages go first
clang = "22.1.0"
go = "1.26.1"
java = "openjdk-26.0.0"
lua = "5.5.0"
luajit = "2.1.1744318430"
node = "25.9.0"
python = "3.14.3"
ruby = "4.0.2"
rust = "1.94.1"
terraform = "1.14.8"

# Then tools
awscli = { version = "2.34.22", symlink_bins = "true" }
cmake = "4.3.1"
coursier = { version = "2.1.24", exe = "cs" }
gcloud = "563.0.0"
gh = "2.89.0"
helm = "4.1.3"
make = "4.4.1"
maven = "3.9.14"
ninja = "1.13.2"
opencode = "1.3.13"
tree-sitter = "0.26.8"
uv = "0.11.3"

# And custom tools
[tools."http:cypher-shell"]
# Check latest version at: https://neo4j.com/deployment-center/?cypher-shell
version = "2026.03.1"
bin = "cypher-shell"
url = "https://dist.neo4j.org/cypher-shell/cypher-shell-{{ version }}.zip"
checksum = "sha256:9f8ed192c9cbbb9340e69992efc48799a017f5c187f761d220031750226d5345"
