[settings]
experimental = true
lockfile = true

[tools]
# Languages first
go = "1.26.4"
java = "openjdk-26.0.1"
lua = "5.1"
luajit = "2.1.1744318430"
node = "26.3.0"
python = "3.14.6"
ruby = "4.0.5"
rust = "1.96.0"
terraform = "1.15.6"

# Then tools
awscli = { version = "2.35.3", symlink_bins = "true" }
azure = { version = "2.87.0", uvx_args = "--prerelease=allow" }
bun = "1.3.14"
cmake = "4.3.3"
coursier = { version = "2.1.24", exe = "cs" }
gcloud = { version = "572.0.0", postinstall = "gcloud components install $(cat ~/.default-cloud-sdk-components)" }
gh = "2.94.0"
helm = "4.2.0"
jb = "0.6.0"
make = "4.4.1"
maven = "3.9.16"
ninja = "1.13.2"
opencode = "1.17.3"
rtk = { version = "0.42.3", postinstall = "rtk init -g --opencode" }
tree-sitter = "0.26.9"
uv = "0.11.21"

# And custom tools
[tools."http:cypher-shell"]
# Check latest version at: https://neo4j.com/deployment-center/?cypher-shell
version = "2026.05.0"
bin = "cypher-shell"
url = "https://dist.neo4j.org/cypher-shell/cypher-shell-{{ version }}.zip"
checksum = "sha256:60936421a4af667876fdb7d6e17bdb4a22439d7e09254ffc5fcc2e4f9fbcc9ae"
