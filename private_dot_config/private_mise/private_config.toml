[settings]
experimental = true
lockfile = true

[tools]
# Languages first
go = "1.26.5"
java = "openjdk-26.0.1"
lua = "5.1"
luajit = "2.1.1744318430"
node = "26.5.0"
python = "3.14.6"
ruby = "4.0.5"
rust = "1.97.0"
terraform = "1.15.8"

# Then tools
awscli = { version = "2.35.21", symlink_bins = "true" }
azure = { version = "2.88.0", uvx_args = "--prerelease=allow" }
bun = "1.3.14"
clang-format = "22.1.8"
cmake = "4.3.3"
coursier = { version = "2.1.24", exe = "cs" }
gcloud = { version = "575.0.1", postinstall = "gcloud components install $(cat ~/.default-cloud-sdk-components)" }
gh = "2.96.0"
helm = "4.2.3"
jb = "0.6.0"
make = "4.4.1"
maven = "3.9.16"
ninja = "1.13.2"
opencode = "1.17.18"
rtk = { version = "0.43.0", postinstall = "rtk init -g --opencode" }
tree-sitter = "0.26.10"
uv = "0.11.28"
clang = "22.1.7"

# And custom tools
[tools."http:cypher-shell"]
# Check latest version at: https://neo4j.com/deployment-center/?cypher-shell
version = "2026.06.0"
bin = "cypher-shell"
url = "https://dist.neo4j.org/cypher-shell/cypher-shell-{{ version }}.zip"
checksum = "sha256:ac198108b6a4a5d74de29f01e26dc18219060164343bcaad7de12cd768fe0cc0"
