colors:
  # based off of solarized vivid theme and dracula/dircolors
  # Based on 'dracula' theme
  # (https://draculatheme.com/)
  #
  # The assignment of colors to file types roughly follows `dircolors`
  # base00: "#282a36"
  # base01: "#34353e"
  # base02: "#43454f"
  # base03: "#78787e"
  # base04: "#a5a5a9"
  # base05: "#e2e4e5"
  # base06: "#eff0eb"
  # base07: "#f1f1f0"
  # base08: "#ff5c57"
  # base09: "#ff9f43"
  # base0A: "#f3f99d"
  # base0B: "#5af78e"
  # base0C: "#9aedfe"
  # base0D: "#57c7ff"
  # base0E: "#ff6ac1"
  # base0F: "#b2643c"

  black:  "282a36"
  red:    "ff5c57"
  green:  "5af78e"
  yellow: "f3f99d"
  blue:   "57c7ff"
  purple: "ff6ac1"
  cyan:   "9aedfe"
  orange: "ff9f43"
  white:  "e2e4e5"
  gray:   "78787e"

core:
  normal_text:
    foreground: white

  regular_file:
    foreground: white

  reset_to_normal:
    foreground: white

  directory:
    foreground: blue

  symlink:
    foreground: orange

  multi_hard_link: {}

  fifo:
    foreground: orange

  socket:
    foreground: blue
    font-style: bold

  door:
    foreground: blue
    font-style: bold

  block_device:
    foreground: orange
    font-style: bold

  character_device:
    foreground: orange
    font-style: bold

  broken_symlink:
    foreground: red
    font-style: bold

  missing_symlink_target:
    foreground: red

  setuid:
    foreground: white
    background: red

  setgid:
    foreground: black
    background: orange

  file_with_capability: {}

  sticky_other_writable:
    foreground: black
    background: green

  other_writable:
    foreground: purple
    background: green

  sticky:
    foreground: white
    background: purple

  executable_file:
    foreground: green

text:
  special:
    foreground: yellow

  todo:
    foreground: yellow
    font-style: bold

  licenses:
    foreground: yellow

  configuration:
    foreground: yellow

  other:
    foreground: yellow

markup:
  foreground: yellow

programming:
  foreground: yellow

media:
  image:
    foreground: blue

  audio:
    foreground: cyan

  video:
    foreground: yellow
    font-style: bold

  fonts:
    foreground: yellow

  3d:
    foreground: blue

office:
  foreground: yellow

archives:
  foreground: red
  font-style: bold

executable:
  foreground: green

unimportant:
  foreground: gray
