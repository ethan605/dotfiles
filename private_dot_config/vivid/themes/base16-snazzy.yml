colors:
  # Based on https://github.com/tinted-theming/base16-vivid/blob/main/themes/base16-snazzy.yml

  black:  "282a36" # base00
  gray:   "78787e" # base03
  white:  "e2e4e5" # base06
  red:    "ff5c57" # base08
  orange: "ff9f43" # base09
  yellow: "f3f99d" # base0A
  green:  "5af78e" # base0B
  cyan:   "9aedfe" # base0C
  blue:   "57c7ff" # base0D
  purple: "ff6ac1" # base0E

core:
  normal_text:
    foreground: white

  regular_file:
    foreground: white

  reset_to_normal:
    foreground: white

  directory:
    foreground: blue

  symlink:
    foreground: orange

  multi_hard_link: {}

  fifo:
    foreground: orange

  socket:
    foreground: blue
    font-style: bold

  door:
    foreground: blue
    font-style: bold

  block_device:
    foreground: orange
    font-style: bold

  character_device:
    foreground: orange
    font-style: bold

  broken_symlink:
    foreground: red
    font-style: bold

  missing_symlink_target:
    foreground: red

  setuid:
    foreground: white
    background: red

  setgid:
    foreground: black
    background: orange

  file_with_capability: {}

  sticky_other_writable:
    foreground: black
    background: green

  other_writable:
    foreground: purple
    background: green

  sticky:
    foreground: white
    background: purple

  executable_file:
    foreground: green

text:
  special:
    foreground: yellow

  todo:
    foreground: yellow
    font-style: bold

  licenses:
    foreground: yellow

  configuration:
    foreground: yellow

  other:
    foreground: yellow

markup:
  foreground: yellow

programming:
  foreground: yellow

media:
  image:
    foreground: blue

  audio:
    foreground: cyan

  video:
    foreground: yellow
    font-style: bold

  fonts:
    foreground: yellow

  3d:
    foreground: blue

office:
  foreground: yellow

archives:
  foreground: red
  font-style: bold

executable:
  foreground: green

unimportant:
  foreground: gray
